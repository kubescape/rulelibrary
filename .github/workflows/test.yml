name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.24'
        
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
          
    - name: Download dependencies
      run: go mod download

    - name: Fix go
      run: go env -w GOTOOLCHAIN=go1.25.0+auto
      
    - name: Run tests
      run: go test ./...

    - name: Lint projection declarations
      run: make lint-projection
      
    - name: Run tests with coverage
      run: go test -coverprofile=coverage.out ./...
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.out
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Install bats
      run: sudo apt-get update && sudo apt-get install -y bats

    - name: Run README check tests
      run: bats scripts/check_readmes_test.bats

    - name: Generate Rules CRD
      run: make generate-rules-crd
        
    - name: Upload Rules CRD as artifact
      uses: actions/upload-artifact@v4
      with:
        name: rules-crd
        path: rules-crd.yaml
        retention-days: 30 
