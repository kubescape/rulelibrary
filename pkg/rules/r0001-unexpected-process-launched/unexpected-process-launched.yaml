apiVersion: kubescape.io/v1
kind: Rules
metadata:
  name: unexpected-process-launched-rule
  namespace: kubescape
  labels:
    app: kubescape
spec:
  rules:
  - name: "Unexpected process launched"
    enabled: true
    id: "R0001"
    description: "Detects unexpected process launches that are not in the baseline"
    expressions:
      message: "'Unexpected process launched: ' + event.event_event_comm + ' with PID ' + string(event.event_event_pid)"
      unique_id: "event.event_event_comm + '_' + event.event_event_exe_path"
      rule_expression:
        - event_type: "exec"
          expression: "!ap.was_executed(event.event_event_event_common_data_runtime_container_id, parse.get_exec_path(event.event_event_args, event.event_event_comm))"
    profile_dependency: 0
    severity: 1
    support_policy: false
    tags:
      - "anomaly"
      - "process"
      - "exec"
      - "applicationprofile"
