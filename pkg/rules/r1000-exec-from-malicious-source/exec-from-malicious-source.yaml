apiVersion: kubescape.io/v1
kind: Rules
metadata:
  name: exec-from-malicious-source-rule
  namespace: kubescape
  labels:
    app: kubescape
spec:
  rules:
    - name: "Process Executed from /dev/shm"
      enabled: true
      id: "R1000"
      description: "Detecting exec calls whose executable path or working directory is under /dev/shm, a world-writable memory-backed (tmpfs) directory."
      expressions:
        message: "'Process executed from /dev/shm: ' + event.exepath + ' in directory ' + event.cwd"
        uniqueId: "event.comm + '_' + event.exepath + '_' + event.pcomm"
        ruleExpression:
          - eventType: "exec"
            expression: >
              (event.exepath == '/dev/shm' || event.exepath.startsWith('/dev/shm/')) ||
              (event.cwd == '/dev/shm' || event.cwd.startsWith('/dev/shm/')) ||
              (event.args.size() > 0 && (event.args[0] == '/dev/shm' || event.args[0].startsWith('/dev/shm/')))
      profileDependency: 2
      severity: 8
      supportPolicy: false
      isTriggerAlert: true
      mitreTactic: "TA0002"
      mitreTechnique: "T1059"
      tags:
        - "context:kubernetes"
        - "context:host"
        - "exec"
        - "signature"
        - "malicious"
